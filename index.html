<!DOCTYPE html>
<html>
<head>
    <title>Kitty website</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #fafafa;
        padding: 20px;
        text-align: center;
      }

      .gallery-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        padding-top: 20px;
      }

      .box {
        width: 300px;
        height: 250px;
        border: 2px solid #333;
        padding: 10px;
        border-radius: 8px;
        background-color: #f0f0f0; 
        overflow: hidden;
        transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      }

      .box:hover {
        transform: scale(1.05);
        border-color: #ff69b4;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      }

      .box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        border-radius: 4px;
      }
    </style>
</head>
<body>

    <h1>Kitty website</h1>
    <p>This is a basic kitty website</p>
    <p>This website have collection of kitty pics from internet</p>

    <div class="gallery-container">
      
        <div class="box"><img src="assets/cat 1.jpg" alt="Cat 1" loading="lazy"></div>
        <div class="box"><img src="assets/cat 2.jpg" alt="Cat 2" loading="lazy"></div>
        <div class="box"><img src="assets/cat 3.jpg" alt="Cat 3" loading="lazy"></div>
        <div class="box"><img src="assets/cat 4.jpg" alt="Cat 4" loading="lazy"></div>
        <div class="box"><img src="assets/cat 5.jpg" alt="Cat 5" loading="lazy"></div>
        <div class="box"><img src="assets/cat 6.jpg" alt="Cat 6" loading="lazy"></div>
        <div class="box"><img src="assets/cat 7.jpg" alt="Cat 7" loading="lazy"></div>
        <div class="box"><img src="assets/cat 8.jpg" alt="Cat 8" loading="lazy"></div>
        <div class="box"><img src="assets/cat 9.jpg" alt="Cat 9" loading="lazy"></div>
        <div class="box"><img src="assets/cat 10.jpg" alt="Cat 10" loading="lazy"></div>
        <div class="box"><img src="assets/cat 11.jpg" alt="Cat 11" loading="lazy"></div>
        <div class="box"><img src="assets/cat 12.jpg" alt="Cat 12" loading="lazy"></div>
        <div class="box"><img src="assets/cat 13.jpg" alt="Cat 13" loading="lazy"></div>

    </div>

</body>
</html>
